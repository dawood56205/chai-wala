{% load static tailwind_tags %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    {% block title %}  {% endblock %}
    <link rel="stylesheet" href="{% static 'style1.css' %}" />
    <link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@800&family=Lora&display=swap" rel="stylesheet">
    
    {% tailwind_css %}
    
  </head>
  <body class="bg-yellow-50">
    <nav>
      <nav class="">
        <div class=" w-auto m-auto flex justify-between ">
          <h1 class="text-white text-3xl font-mono font-bold bg-amber-600 pl-5 pr-5 pt-2 pb-2">CHAI WALA</h1>
          <ol class="flex gap-6 text-black  font-bold ">
            <a href="{% url 'all_chai' %}"><button class = "mt-3 text-xl hover:cursor-pointer border-b-3 border-transparent hover:border-amber-600 pr-2 pl-2  hover:text-black transition-all duration-300">Home</button></a>
            <a href="#chai"><button class = "mt-3 text-xl hover:cursor-pointer border-b-3 border-transparent hover:border-amber-600 pr-2 pl-2  hover:text-black transition-all duration-300">Chais</button></a>
            <a href="#about"><button class = "mt-3 text-xl hover:cursor-pointer border-b-3 border-transparent hover:border-amber-600 pr-2 pl-2  hover:text-black transition-all duration-300">About</button></a>
            <a href=""><button class = "mt-3 text-xl hover:cursor-pointer border-b-3 border-transparent hover:border-amber-600 pr-2 pl-2  hover:text-black transition-all duration-300">Contact Us</button></a>
           
          </ol>
          <button onclick="menu.hidden^=1" class="text-black mt-1 hover:cursor-pointer hover:bg-amber-900 hover:text-white transition-all duration-300 p-1 pr-2 pl-2 rounded">|||</button>
          <ul id="menu" hidden>
            <li>HOME</li>
            <li>ABOUT</li>
            <li>CONTATC</li>
          </ul>
        </div>
       
      </nav>
    </nav>
    {% block content %} default value {% endblock %}
  </body>
</html>
